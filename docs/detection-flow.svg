<svg viewBox="0 0 700 640" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', 'Cascadia Code', 'Fira Mono', monospace">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6b7280"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#16a34a"/>
    </marker>
    <marker id="arr-c" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0891b2"/>
    </marker>
    <marker id="arr-p" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7c6af7"/>
    </marker>
    <style>
      .box-start { fill: #f3f0ff; stroke: #7c6af7; stroke-width: 1.5; }
      .box-proc  { fill: #f9fafb; stroke: #d1d5db; stroke-width: 1.5; }
      .box-code  { fill: #f0fdf4; stroke: #22c55e; stroke-width: 1.5; }
      .box-chat  { fill: #ecfeff; stroke: #06b6d4; stroke-width: 1.5; }
      .box-end   { fill: #f3f0ff; stroke: #7c6af7; stroke-width: 1.5; stroke-dasharray: 4 3; }
      .diamond   { fill: #f3f0ff; stroke: #7c6af7; stroke-width: 1.5; }
      .t-main    { font-size: 13px; fill: #111827; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }
      .t-sub     { font-size: 11px; fill: #6b7280; text-anchor: middle; dominant-baseline: middle; }
      .t-badge   { font-size: 10px; fill: #7c6af7; text-anchor: middle; dominant-baseline: middle; }
      .t-yes     { font-size: 11px; fill: #16a34a; font-weight: 600; }
      .t-no      { font-size: 11px; fill: #0891b2; font-weight: 600; }
      .t-code    { font-size: 12px; fill: #166534; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }
      .t-code-s  { font-size: 10px; fill: #15803d; text-anchor: middle; dominant-baseline: middle; }
      .t-chat    { font-size: 12px; fill: #0e7490; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }
      .t-chat-s  { font-size: 10px; fill: #0891b2; text-anchor: middle; dominant-baseline: middle; }
      .line      { stroke: #9ca3af; stroke-width: 1.5; fill: none; }
      .line-g    { stroke: #22c55e; stroke-width: 1.5; fill: none; }
      .line-c    { stroke: #06b6d4; stroke-width: 1.5; fill: none; }
      .line-p    { stroke: #7c6af7; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <!-- background -->
  <rect width="700" height="640" fill="white" rx="12"/>

  <!-- ── START: every prompt ── -->
  <rect x="250" y="20" width="200" height="44" rx="22" class="box-start"/>
  <text x="350" y="42" class="t-main" fill="#4a3db5">Every Prompt</text>

  <!-- arrow down -->
  <line x1="350" y1="64" x2="350" y2="96" class="line-p" marker-end="url(#arr-p)"/>

  <!-- ── detect_intent.py ── -->
  <rect x="210" y="100" width="280" height="52" rx="8" class="box-proc"/>
  <text x="350" y="120" class="t-main">detect_intent.py</text>
  <text x="350" y="138" class="t-sub">rule-based · instant · no API</text>

  <!-- arrow down -->
  <line x1="350" y1="152" x2="350" y2="182" class="line" marker-end="url(#arr)"/>

  <!-- ── DIAMOND: CODE intent? ── -->
  <!-- diamond points: top(350,186) right(440,236) bottom(350,286) left(260,236) -->
  <polygon points="350,186 440,236 350,286 260,236" class="diamond"/>
  <text x="350" y="230" class="t-main" fill="#4a3db5">CODE</text>
  <text x="350" y="248" class="t-badge">intent?</text>

  <!-- YES label + arrow RIGHT → caveman-code -->
  <text x="452" y="228" class="t-yes">YES</text>
  <path d="M440,236 L580,236 L580,308" class="line-g" marker-end="url(#arr-g)"/>

  <!-- NO label + arrow LEFT → caveman-chat -->
  <text x="218" y="228" class="t-no" text-anchor="end">NO</text>
  <path d="M260,236 L120,236 L120,308" class="line-c" marker-end="url(#arr-c)"/>

  <!-- ── caveman-code box (right) ── -->
  <rect x="490" y="308" width="190" height="90" rx="8" class="box-code"/>
  <text x="585" y="335" class="t-code">caveman-code</text>
  <text x="585" y="353" class="t-code-s">terse prose +</text>
  <text x="585" y="368" class="t-code-s">validation-first</text>
  <text x="585" y="383" class="t-code-s">spec-before-build</text>

  <!-- ── caveman-chat box (left) ── -->
  <rect x="20" y="308" width="190" height="90" rx="8" class="box-chat"/>
  <text x="115" y="335" class="t-chat">caveman-chat</text>
  <text x="115" y="353" class="t-chat-s">terse prose only</text>
  <text x="115" y="368" class="t-chat-s">no engineering</text>
  <text x="115" y="383" class="t-chat-s">methodology</text>

  <!-- convergence lines → center -->
  <path d="M580,398 L580,440 L440,440" class="line-g"/>
  <path d="M120,398 L120,440 L260,440" class="line-c"/>
  <line x1="350" y1="440" x2="350" y2="460" class="line" marker-end="url(#arr)"/>

  <!-- ── scan skills ── -->
  <rect x="210" y="460" width="280" height="52" rx="8" class="box-proc"/>
  <text x="350" y="480" class="t-main">Scan installed skills</text>
  <text x="350" y="498" class="t-sub">~/.claude · ~/skills · .cursor · opencode…</text>

  <!-- arrow down -->
  <line x1="350" y1="512" x2="350" y2="542" class="line" marker-end="url(#arr)"/>

  <!-- ── score & route ── -->
  <rect x="210" y="546" width="280" height="52" rx="8" class="box-proc"/>
  <text x="350" y="566" class="t-main">Score &amp; route</text>
  <text x="350" y="584" class="t-sub">+10 name · +5 trigger · +1 overlap</text>

  <!-- arrow down -->
  <line x1="350" y1="598" x2="350" y2="610" class="line-p" marker-end="url(#arr-p)"/>

  <!-- ── inject & respond (end) ── -->
  <rect x="210" y="610" width="280" height="20" rx="10" class="box-end"/>
  <text x="350" y="620" class="t-badge">Inject context → AI responds</text>
</svg>
